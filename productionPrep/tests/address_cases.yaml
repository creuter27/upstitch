# Address test cases — one case per entry.
#
# Each case documents a real address pattern seen in production.
# Fields:
#   description:      human-readable label
#   addr:             input ShippingAddress fields (only relevant fields needed)
#   expected_issues:  list of issue codes that check() must return (subset match — extra OK)
#   expected_fix:     dict of fields that _deterministic_suggestion() must return
#                     (subset match — extra fields in actual fix are OK)
#   notes:            optional context / source order

cases:

  # ── House number in street field (end) ──────────────────────────────────────
  - description: "House number embedded at end of street"
    addr:
      Street: "Hauptstraße 26"
      HouseNumber: ""
      CountryISO2: "DE"
      Zip: "12345"
      City: "Berlin"
    expected_issues:
      - HOUSE_NUMBER_IN_STREET
    expected_fix:
      Street: "Hauptstraße"
      HouseNumber: "26"

  - description: "House number with letter suffix at end of street"
    addr:
      Street: "Musterweg 26a"
      HouseNumber: ""
      CountryISO2: "DE"
      Zip: "12345"
      City: "Berlin"
    expected_issues:
      - HOUSE_NUMBER_IN_STREET
    expected_fix:
      Street: "Musterweg"
      HouseNumber: "26a"

  - description: "House number with trailing floor text"
    addr:
      Street: "Berliner Str. 14b EG"
      HouseNumber: ""
      CountryISO2: "DE"
      Zip: "12345"
      City: "Berlin"
    expected_issues:
      - HOUSE_NUMBER_IN_STREET
    expected_fix:
      Street: "Berliner Str."
      HouseNumber: "14b"
      AddressAddition: "EG"

  # ── House number at start of street ─────────────────────────────────────────
  - description: "House number at start of street (26 Auenweg) — Austrian order"
    notes: "Real case: Marina Unterweger, AT, OpenCage confirmed Auenweg 26"
    addr:
      Street: "26 Auenweg"
      HouseNumber: ""
      CountryISO2: "AT"
      Zip: "9813"
      City: "Möllbrücke"
    expected_issues:
      - HOUSE_NUMBER_AT_START_OF_STREET
    expected_fix:
      Street: "Auenweg"
      HouseNumber: "26"

  # ── Street field contains only a house number ────────────────────────────────
  - description: "Street is only a house number, company may hold street name"
    notes: "Real case: Judith Becker, DE, Street=36 Company=Knippchen. Company is treated as street name."
    addr:
      Street: "36"
      HouseNumber: ""
      Company: "Knippchen"
      CountryISO2: "DE"
      Zip: "52393"
      City: "Hürtgenwald"
    expected_issues:
      - STREET_IS_HOUSE_NUMBER
    expected_fix:
      Street: "Knippchen"
      HouseNumber: "36"
      Company: ""

  - description: "Street is only a house number, no company"
    addr:
      Street: "14a"
      HouseNumber: ""
      Company: ""
      CountryISO2: "DE"
      Zip: "12345"
      City: "Berlin"
    expected_issues:
      - STREET_IS_HOUSE_NUMBER
    expected_fix:
      HouseNumber: "14a"
      Street: ""

  # ── ZIP has country prefix ───────────────────────────────────────────────────
  - description: "ZIP has German country prefix D-"
    addr:
      Street: "Hauptstraße"
      HouseNumber: "1"
      CountryISO2: "DE"
      Zip: "D-86899"
      City: "Landsberg"
    expected_issues:
      - ZIP_HAS_COUNTRY_PREFIX
    expected_fix:
      Zip: "86899"

  - description: "ZIP has Luxembourg prefix L-"
    addr:
      Street: "Rue de la Gare"
      HouseNumber: "5"
      CountryISO2: "LU"
      Zip: "L-0826"
      City: "Kehlen"
    expected_issues:
      - ZIP_HAS_COUNTRY_PREFIX
    expected_fix:
      Zip: "0826"   # leading zero preserved by strip_zip_prefix; OpenCage returns the correct 4-digit LU zip

  - description: "ZIP has Austrian prefix A-"
    addr:
      Street: "Bergstraße"
      HouseNumber: "3"
      CountryISO2: "AT"
      Zip: "A-6020"
      City: "Innsbruck"
    expected_issues:
      - ZIP_HAS_COUNTRY_PREFIX
    expected_fix:
      Zip: "6020"

  # ── House number in AddressAddition ─────────────────────────────────────────
  - description: "House number entered in AddressAddition field"
    addr:
      Street: "Musterstraße"
      HouseNumber: ""
      AddressAddition: "42"
      CountryISO2: "DE"
      Zip: "12345"
      City: "Berlin"
    expected_issues:
      - HOUSE_NUMBER_IN_ADDITION
    expected_fix:
      HouseNumber: "42"
      AddressAddition: ""

  # ── Street normalisation (check_address finds no issue; geocode handles it) ─
  - description: "str. abbreviation in street — no issue raised by check_address"
    notes: "Normalisation (Str.→Straße) is handled by geocode+_is_street_normalization, not check_address"
    addr:
      Street: "Hallgarter Str."
      HouseNumber: "1"
      CountryISO2: "DE"
      Zip: "65346"
      City: "Eltville am Rhein"
    expected_issues: []
    expected_fix: {}

  # ── City must not be changed when original is correct ───────────────────────
  - description: "City correct — AddressAddition with personal c/o name must not trigger city change"
    notes: >
      Real case: Carbone Giovanna, IT. AddressAddition='Presso Carbone Giovanna' (c/o note)
      contains the recipient's last name. OpenCage was confused and returned 'Giovanna' as
      the city with high confidence. The original city 'Anagni' is correct and must not be
      replaced. Fix: verify original city independently (ZIP+city+country) before suggesting
      a replacement.
    addr:
      Street: "Via Generale Carlo Alberto Dalla Chiesa"
      HouseNumber: "9A"
      AddressAddition: "Presso Carbone Giovanna"
      Zip: "03012"
      City: "Anagni"
      CountryISO2: "IT"
    expected_issues: []
    expected_fix: {}

  # ── STREET_IS_HOUSE_NUMBER + Company has street name ────────────────────────
  - description: "Company has street name, street field has only house number (no number in Company)"
    notes: "Real case: Victoria Serova, DE #304-6488156-3898760. Company=street name, Street=house number only."
    addr:
      FirstName: Victoria
      LastName: Serova
      Company: "Unterlindhofstr"
      Street: "16"
      HouseNumber: ""
      Zip: "93173"
      City: "Wenzenbach"
      CountryISO2: "DE"
    expected_issues:
      - STREET_IS_HOUSE_NUMBER
    expected_fix:
      Company: ""
      Street: "Unterlindhofstr"
      HouseNumber: "16"

  - description: "Company has street name, street field has only house number (Mendelweg)"
    notes: "Real case: Kristina Cheraghi, DE #302-7578467-3394703."
    addr:
      FirstName: Kristina
      LastName: Cheraghi
      Company: "Mendelweg"
      Street: "102"
      HouseNumber: ""
      Zip: "40591"
      City: "Düsseldorf"
      CountryISO2: "DE"
    expected_issues:
      - STREET_IS_HOUSE_NUMBER
    expected_fix:
      Company: ""
      Street: "Mendelweg"
      HouseNumber: "102"

  - description: "Company has full street address with house number, street field has only house number (BG)"
    notes: "Real case: Victor Atanasov, BG #304-5210899-6361948. Company contains full address."
    addr:
      FirstName: Victor
      LastName: Atanasov
      Company: "Boulevard Tsarigradsko Shose 86, 1784 Sofia"
      Street: "86"
      HouseNumber: ""
      Zip: "1784"
      City: "Sofia"
      CountryISO2: "BG"
    expected_issues:
      - STREET_IS_HOUSE_NUMBER
    expected_fix:
      Company: ""
      Street: "Boulevard Tsarigradsko Shose"
      HouseNumber: "86"

  # ── HOUSE_NUMBER_IN_STREET with existing HouseNumber starting with "/" ───────
  - description: "AT: Street contains house number + floor suffix, HouseNumber is staircase code /4"
    notes: "Real case: Julia Kitzler, AT #4003909336. HouseNumber='/4' is apt/staircase, real hn is in Street."
    addr:
      FirstName: Julia
      LastName: Kitzler
      Street: "Schmiedgasse 37d"
      HouseNumber: "/4"
      Zip: "2020"
      City: "Hollabrunn"
      CountryISO2: "AT"
    expected_issues:
      - HOUSE_NUMBER_IN_STREET
    expected_fix:
      Street: "Schmiedgasse"
      HouseNumber: "37d"
      AddressAddition: "/4"

  # ── HOUSE_NUMBER_EQUALS_ZIP ──────────────────────────────────────────────────
  - description: "DE: HouseNumber equals ZIP code — real house number is in Street field"
    notes: "Real case: Barbara Scrbec, DE #306-6233920-6029104. HouseNumber='10825'==Zip='10825'."
    addr:
      FirstName: Barbara
      LastName: Scrbec
      Company: "Martin Luther Strasse 114 10825"
      Street: "Martin Luther Strasse 114"
      HouseNumber: "10825"
      Zip: "10825"
      City: "Berlin"
      CountryISO2: "DE"
    expected_issues:
      - HOUSE_NUMBER_EQUALS_ZIP
    expected_fix:
      Street: "Martin Luther Strasse"
      HouseNumber: "114"

  # ── STREET_IS_SINGLE_LETTER_COMPANY_HAS_ADDRESS ──────────────────────────────
  - description: "CH: Street is single letter 'A', Company contains real street address"
    notes: "Real case: Arijeet Roychoudhury, CH #028-5384544-6961944. Real address is in Company field."
    addr:
      FirstName: Arijeet
      LastName: Roychoudhury
      Company: "Geerenstrasse 24"
      Street: "A"
      HouseNumber: "1-0203"
      Zip: "8302"
      City: "Kloten"
      CountryISO2: "CH"
    expected_issues:
      - STREET_IS_SINGLE_LETTER_COMPANY_HAS_ADDRESS
    expected_fix:
      Company: ""
      Street: "Geerenstrasse"
      HouseNumber: "24"
      AddressAddition: "A 1-0203"

  # ── House number in AddressAddition (with suburb in city name) ───────────────
  - description: "DE: House number in AddressAddition, city name contains suburb (Auetal-Rehren)"
    notes: "Real case: Nancy Greiffenreich-Sieb, DE #4010995439. AddressAddition='12' is house number."
    addr:
      FirstName: Nancy
      LastName: Greiffenreich-Sieb
      Street: "Danziger Str."
      AddressAddition: "12"
      HouseNumber: ""
      Zip: "31749"
      City: "Auetal-Rehren"
      CountryISO2: "DE"
    expected_issues:
      - HOUSE_NUMBER_IN_ADDITION
    expected_fix:
      HouseNumber: "12"
      AddressAddition: ""

  # ── Complex AT slash notation — no deterministic fix ────────────────────────
  - description: "AT: Street contains complex slash notation, no deterministic fix possible"
    notes: "Real case: Zehra Aksu, AT #302-0875844-4257965. Street='Ketzergasse 98/1/' with HouseNumber='3'."
    addr:
      FirstName: Frau
      LastName: Zehra Aksu
      Street: "Ketzergasse 98/1/"
      HouseNumber: "3"
      Zip: "1230"
      City: "Wien"
      CountryISO2: "AT"
    expected_issues: []
    expected_fix: {}

  # ── Missing house number (no number anywhere) ────────────────────────────────
  - description: "Street filled but house number missing and not detectable"
    addr:
      Street: "Gartenweg"
      HouseNumber: ""
      CountryISO2: "DE"
      Zip: "12345"
      City: "Berlin"
    expected_issues:
      - MISSING_HOUSE_NUMBER
    expected_fix: {}
