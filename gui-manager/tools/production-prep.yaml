id: production-prep
name: Produktionsvorbereitung
sidebar_order: 2
path: ../productionPrep
description: Produktionsvorbereitung – Adressen korrigieren, Dokumente abrufen, Versandlabels erstellen
panel_type: production-prep
functions:
  - name: "Start"
    command: "./run.sh"
    description: "Führt alle vier Schritte nacheinander aus: Dokumente abrufen, Designs importieren, Adressen & Verpackung korrigieren, Versandlabels erstellen."
    is_launch: true
    supports_dry_run: true
  - name: "fetchDocuments"
    command: "./fetchDocuments.sh"
    description: "Lädt Rechnungen und Lieferscheine von Billbee / Google Drive."
    supports_dry_run: true
  - name: "importDesigns"
    command: "./importDesigns.sh"
    description: "Importiert die Design-CSV als neues datumsbasiertes Tab in 'Upstitch Design Sheet'. Öffnet das Tab danach im Browser."
  - name: "fixAddressesAndPackaging"
    command: "./fixAddressesAndPackaging.sh"
    description: "Korrigiert Lieferadressen und setzt Pakettyp-Tags in Billbee. Danach getLabels ausführen, während Billbee die Versandprofile automatisch zuweist."
    supports_dry_run: true
  - name: "getLabels"
    command: "./getLabels.sh"
    description: "Erstellt Versandlabels für Bestellungen im after_fix-Status. Wartet auf Verpackungstyp-Tags und speichert Label-PDFs im labels/-Ordner."
    supports_dry_run: true
panels:
  - id: packaging
    name: Verpackung
    panel_type: packaging
file_tree:
  - config/
  - data/
