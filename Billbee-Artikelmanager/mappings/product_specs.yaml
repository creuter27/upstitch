# Per-manufacturer × category product specifications
# ─────────────────────────────────────────────────────────────────────────────
# Structure:
#   <Manufacturer>:           (exact string as it appears in the Manufacturer
#                              column of the Google Sheet — case-insensitive)
#     <category>:             (category key, matches products.yaml — case-insensitive)
#       default:              (base attributes for this manufacturer × category)
#         material: ...       (free-form string; normalised via materials.yaml
#                              for TARIC lookup — e.g. "textile", "stainless steel")
#         countryOfOrigin: .. (2-letter ISO country code, e.g. CN)
#         weight: ~           (kg, float; → Billbee "Weight" field)
#         length: ~           (cm, float; → Billbee "LengthCm" field)
#         width: ~            (cm, float; → Billbee "WidthCm" field)
#         height: ~           (cm, float; → Billbee "HeightCm" field)
#         cost: ~             (EUR, float; → Billbee "CostPrice" field)
#         price: ~            (EUR, float; → Billbee "Price" field)
#.        verp:  ~            (Billbe "Verpackungstyp" Name)
#       small:                (size-specific overrides — only changed fields needed)
#         weight: ...
#
# Lookup order: manufacturer → category → size (falls back to "default").
# Unknown manufacturer or category → empty dict (no override; products.yaml
# category defaults are used as final fallback in assign_taric.py).
# ─────────────────────────────────────────────────────────────────────────────

